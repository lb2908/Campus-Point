<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus-Point</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #f1f3f5;
      color: #1f2933;
    }

    header {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px 50px;
      background: #e9ecef;
      border-bottom: 1px solid #d0d4d9;
    }

    .logo-left,
    .logo-right {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      max-height: 70px;
      max-width: 150px;
      object-fit: contain;
    }

    .logo-left {
      left: 50px;
    }

    .logo-right {
      right: 50px;
    }

    h1 {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 1px;
      color: #1d3557;
      text-align: center;
    }

    main {
      min-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
    }

    .intro {
      padding: 70px 20px 40px;
    }

    .intro h2 {
      font-size: 32px;
      margin-bottom: 18px;
      color: #2b3a42;
    }

    .intro p {
      font-size: 18px;
      max-width: 850px;
      margin: 0 auto;
      line-height: 1.6;
      color: #4b5563;
    }

    .campus-image {
      width: 100%;
      height: 33vh;
      object-fit: cover;
      display: block;
      margin-top: 40px;
      border-top: 1px solid #d0d4d9;
    }
  </style>
</head>

<body>
  <header>
    <img src="/bilder/Logo_hspv.png" alt="HSPV NRW Logo" class="logo-left" />

    <h1>Campus-Point</h1>

    <img src="/bilder/Logo_nrw.png" alt="NRW Logo" class="logo-right" />
  </header>

  <main>
    <section class="intro">
      <h2>Transparente Studienplatzvergabe für die Verwaltungsinformatik</h2>
      <p>
        Campus-Point unterstützt die strukturierte und nachvollziehbare Kommunikation
        zwischen HSPV, Einstellungsbehörden und weiteren Beteiligten im Rahmen der
        Studienplatzvergabe.
      </p>
    </section>

    <img src="/bilder/hspv_gebaude.jpg" alt="HSPV Studienort" class="campus-image" />
  </main>
</body>
</html>
